<template>
    <lightning-card title="File Upload With Preview" icon-name="standard:file">
        <div class="slds-var-m-around_medium">
            <lightning-input 
                type="file" 
                label="Upload Word Document"
                onchange={handleFiles} 
                accept=".docx">
            </lightning-input>
        </div>
    </lightning-card>
    <template if:true={fileDetails}>
        <c-modal-compenent file-details={fileDetails} raw-buffer = {rawBuffer}></c-modal-compenent>
    </template>
</template>
