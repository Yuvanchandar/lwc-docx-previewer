<template>
    <lightning-card title="File Upload With Preview" icon-name="standard:file">
        <div class="slds-var-m-around_medium">
            <lightning-input 
                type="file" 
                label="Upload Word Document"
                onchange={handleFiles} 
                accept=".docx">
            </lightning-input>

            <template if:true={fileName}>
                <div class="slds-box slds-var-m-top_medium">
                    <p><strong>File Name:</strong> {fileDetails.name}</p>
                    <p><strong>Size:</strong> {fileDetails.size} bytes</p>
                    <p><strong>Type:</strong> {fileDetails.type}</p>
                </div>
                <div class="slds-box slds-theme_default slds-text-longform">
                    <div class="container" lwc:dom="manual"></div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
